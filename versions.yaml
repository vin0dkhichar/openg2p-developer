# Pinned versions for the OpenG2P local developer stack.
# Override individual refs in .env if needed.

workspace:
  default_path: ../openg2p-workspace

repos:
  odoo:
    url: https://github.com/odoo/odoo.git
    ref: "17.0"
    path: odoo17

  pbms:
    url: https://github.com/OpenG2P/openg2p-pbms-odoo.git
    ref: develop
    path: openg2p-pbms-odoo

  pbms_community_addons:
    url: https://github.com/OpenG2P/openg2p-pbms-community-addons.git
    ref: 17.0-develop
    path: openg2p-pbms-community-addons

  pbms_extensions:
    url: https://github.com/OpenG2P/openg2p-pbms-odoo-extensions.git
    ref: develop
    path: openg2p-pbms-odoo-extensions

  openg2p_registry:
    url: https://github.com/OpenG2P/openg2p-registry.git
    ref: 17.0-develop
    path: openg2p-registry

  odoo_commons:
    url: https://github.com/OpenG2P/openg2p-odoo-commons.git
    ref: develop
    path: openg2p-odoo-commons

  registry_platform:
    url: https://github.com/OpenG2P/registry-platform.git
    ref: develop
    path: registry-platform

  registry_gen2_staff_portal_ui:
    url: https://github.com/OpenG2P/openg2p-registry-gen2-staff-portal-ui.git
    ref: develop
    path: openg2p-registry-gen2-staff-portal-ui

  openg2p_data:
    url: https://github.com/OpenG2P/openg2p-data.git
    ref: develop
    path: openg2p-data

  farmer_registry:
    url: https://github.com/OpenG2P/farmer-registry.git
    ref: develop
    path: farmer-registry
    extension_path: farmer-extension

  national_social_registry:
    url: https://github.com/OpenG2P/national-social-registry.git
    ref: develop
    path: national-social-registry
    extension_path: nsr-extension

  g2p_bridge:
    url: https://github.com/OpenG2P/g2p-bridge.git
    ref: develop
    path: g2p-bridge

  spar:
    url: https://github.com/OpenG2P/openg2p-spar.git
    ref: develop
    path: openg2p-spar

images:
  pbms: openg2p/openg2p-pbms-core:1.2.6
  farmer_registry_staff_api: openg2p/openg2p-farmer-registry-staff-portal-api:develop
  farmer_registry_celery: openg2p/openg2p-farmer-registry-celery:develop
  farmer_registry_ui: openg2p/openg2p-farmer-registry-staff-portal-ui:develop
  farmer_registry_db_seed: openg2p/openg2p-farmer-registry-db-seed:develop
  nsr_registry_staff_api: openg2p/openg2p-nsr-registry-staff-portal-api:develop
  nsr_registry_celery: openg2p/openg2p-nsr-registry-celery:develop
  nsr_registry_ui: openg2p/openg2p-nsr-registry-staff-portal-ui:develop
  nsr_registry_db_seed: openg2p/openg2p-nsr-registry-db-seed:develop
  g2p_bridge_partner_api: openg2p/g2p-bridge-partner-api:develop
  g2p_bridge_bene_api: openg2p/g2p-bridge-bene-portal-api:develop
  g2p_bridge_celery: openg2p/g2p-bridge-celery:develop
  g2p_bridge_example_bank: openg2p/openg2p-g2p-bridge-example-bank-api:develop
  postgres: postgres:16
  redis: redis:7-alpine
  minio: minio/minio:latest
  keycloak: quay.io/keycloak/keycloak:26.0

profiles:
  infra:
    description: Shared Postgres, Redis, MinIO, Keycloak
    compose_profiles: [infra]

  pbms:
    description: PBMS Odoo (native or container)
    requires: [infra]
    compose_profiles: [infra, pbms]

  farmer_registry:
    description: Farmer Registry Gen2 (platform + farmer-extension)
    requires: [infra, registry_platform, farmer_registry]
    compose_profiles: [infra, farmer-registry]

  national_social_registry:
    description: National Social Registry Gen2 (platform + nsr-extension)
    requires: [infra, registry_platform, national_social_registry]
    compose_profiles: [infra, nsr-registry]

  bridge:
    description: G2P Bridge APIs, Celery, example bank
    requires: [infra]
    compose_profiles: [infra, bridge]

  spar:
    description: SPAR mapper and beneficiary portal APIs
    requires: [infra]
    compose_profiles: [infra, spar]

  full:
    description: All infrastructure and containerized apps
    requires: [infra, pbms, farmer_registry, national_social_registry, bridge, spar]
    compose_profiles: [infra, pbms, farmer-registry, nsr-registry, bridge, spar]
