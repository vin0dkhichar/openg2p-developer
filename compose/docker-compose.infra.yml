name: openg2p-developer

# Shared infrastructure for all OpenG2P local profiles.
# Start with: make infra-up

services:
  postgres:
    profiles: [infra, pbms, farmer-registry, nsr-registry, farmer-registry-seed, nsr-registry-seed, bridge, spar, full]
    image: postgres:16
    container_name: openg2p-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    profiles: [infra, farmer-registry, nsr-registry, bridge, full]
    image: redis:7-alpine
    container_name: openg2p-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    profiles: [infra, farmer-registry, nsr-registry, farmer-registry-seed, nsr-registry-seed, full]
    image: minio/minio:latest
    container_name: openg2p-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-adminsecret}
    ports:
      - "9000:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio-init:
    profiles: [infra, farmer-registry, nsr-registry, farmer-registry-seed, nsr-registry-seed, full]
    image: minio/mc:latest
    container_name: openg2p-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-admin} ${MINIO_ROOT_PASSWORD:-adminsecret} &&
      mc mb --ignore-existing local/default_bucket &&
      mc mb --ignore-existing local/templates &&
      exit 0
      "
    restart: "no"

  keycloak:
    profiles: [infra, pbms, farmer-registry, nsr-registry, farmer-registry-seed, nsr-registry-seed, bridge, spar, full]
    image: quay.io/keycloak/keycloak:26.0
    platform: linux/amd64
    container_name: openg2p-keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    ports:
      - "8080:8080"
    volumes:
      - ../keycloak/realm-export:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  keycloak-init:
    profiles: [infra, pbms, farmer-registry, nsr-registry, farmer-registry-seed, nsr-registry-seed, bridge, spar, full]
    image: quay.io/keycloak/keycloak:26.0
    platform: linux/amd64
    container_name: openg2p-keycloak-init
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_HOST: keycloak
      KEYCLOAK_PORT: "8080"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-staff}
      KEYCLOAK_IAM_CLIENT_SECRET: ${KEYCLOAK_IAM_CLIENT_SECRET:-dev-iam-staff-secret}
      KEYCLOAK_DEV_USER: ${KEYCLOAK_DEV_USER:-staff}
      KEYCLOAK_DEV_PASSWORD: ${KEYCLOAK_DEV_PASSWORD:-staff}
      IAM_STAFF_PORT: ${IAM_STAFF_PORT:-8020}
      FARMER_REGISTRY_UI_PORT: ${FARMER_REGISTRY_UI_PORT:-3000}
      NSR_REGISTRY_UI_PORT: ${NSR_REGISTRY_UI_PORT:-3010}
      PBMS_HTTP_PORT: ${PBMS_HTTP_PORT:-8069}
      G2P_BRIDGE_API_PORT: ${G2P_BRIDGE_API_PORT:-8002}
      SPAR_MAPPER_API_PORT: ${SPAR_MAPPER_API_PORT:-8004}
      SPAR_BENE_API_PORT: ${SPAR_BENE_API_PORT:-8005}
    volumes:
      - ../scripts/keycloak-init.sh:/keycloak-init.sh:ro
    entrypoint: ["/bin/bash", "/keycloak-init.sh"]
    restart: "no"

volumes:
  postgres_data:
  minio_data:
