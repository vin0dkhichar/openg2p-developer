name: openg2p-developer

# Optional containerized PBMS (Odoo). For active development, prefer: make pbms-run
services:
  pbms:
    profiles: [pbms, full]
    image: ${PBMS_IMAGE:-openg2p/openg2p-pbms-core:1.2.6}
    container_name: openg2p-pbms
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      HOST: postgres
      USER: pbmsuser
      PASSWORD: pbmspass
      DATABASE: pbmsdb
    ports:
      - "${PBMS_HTTP_PORT:-8069}:8069"
    restart: unless-stopped
