name: openg2p-developer

# Registry Gen2 domain variants. Native dev is recommended:
#   make farmer-registry-run
#   make nsr-registry-run

services:
  farmer-registry-staff-api:
    profiles: [farmer-registry, full]
    image: ${FARMER_REGISTRY_STAFF_API_IMAGE:-openg2p/openg2p-farmer-registry-staff-portal-api:develop}
    container_name: openg2p-farmer-registry-staff-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - ../generated/farmer-registry/staff-portal-api.env
    ports:
      - "${FARMER_REGISTRY_STAFF_API_PORT:-8001}:8000"
    restart: unless-stopped

  farmer-registry-celery-worker:
    profiles: [farmer-registry, full]
    image: ${FARMER_REGISTRY_CELERY_IMAGE:-openg2p/openg2p-farmer-registry-celery:develop}
    container_name: openg2p-farmer-registry-celery-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - ../generated/farmer-registry/celery-workers.env
    restart: unless-stopped

  farmer-registry-staff-ui:
    profiles: [farmer-registry, full]
    image: ${FARMER_REGISTRY_UI_IMAGE:-openg2p/openg2p-farmer-registry-staff-portal-ui:develop}
    container_name: openg2p-farmer-registry-staff-ui
    depends_on:
      - farmer-registry-staff-api
    env_file:
      - ../generated/farmer-registry/staff-portal-ui.env
    ports:
      - "${FARMER_REGISTRY_UI_PORT:-3000}:3000"
    restart: unless-stopped

  nsr-registry-staff-api:
    profiles: [nsr-registry, full]
    image: ${NSR_REGISTRY_STAFF_API_IMAGE:-openg2p/openg2p-nsr-registry-staff-portal-api:develop}
    container_name: openg2p-nsr-registry-staff-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - ../generated/national-social-registry/staff-portal-api.env
    ports:
      - "${NSR_REGISTRY_STAFF_API_PORT:-8011}:8000"
    restart: unless-stopped

  nsr-registry-celery-worker:
    profiles: [nsr-registry, full]
    image: ${NSR_REGISTRY_CELERY_IMAGE:-openg2p/openg2p-nsr-registry-celery:develop}
    container_name: openg2p-nsr-registry-celery-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - ../generated/national-social-registry/celery-workers.env
    restart: unless-stopped

  nsr-registry-staff-ui:
    profiles: [nsr-registry, full]
    image: ${NSR_REGISTRY_UI_IMAGE:-openg2p/openg2p-nsr-registry-staff-portal-ui:develop}
    container_name: openg2p-nsr-registry-staff-ui
    depends_on:
      - nsr-registry-staff-api
    env_file:
      - ../generated/national-social-registry/staff-portal-ui.env
    ports:
      - "${NSR_REGISTRY_UI_PORT:-3010}:3000"
    restart: unless-stopped

  farmer-registry-db-seed:
    profiles: [farmer-registry-seed]
    image: ${FARMER_REGISTRY_DB_SEED_IMAGE:-openg2p/openg2p-farmer-registry-db-seed:develop}
    container_name: openg2p-farmer-registry-db-seed
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: farmer_registry_db
      PGUSER: ${POSTGRES_SUPERUSER:-postgres}
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      LOAD_SAMPLE_DATA: ${LOAD_SAMPLE_DATA:-false}
    restart: "no"

  nsr-registry-db-seed:
    profiles: [nsr-registry-seed]
    image: ${NSR_REGISTRY_DB_SEED_IMAGE:-openg2p/openg2p-nsr-registry-db-seed:develop}
    container_name: openg2p-nsr-registry-db-seed
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: nsr_registry_db
      PGUSER: ${POSTGRES_SUPERUSER:-postgres}
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      LOAD_SAMPLE_DATA: ${LOAD_SAMPLE_DATA:-false}
      LOAD_IMAGES: ${LOAD_IMAGES:-false}
      LOAD_TEMPLATES: ${LOAD_TEMPLATES:-false}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-secret}
      MINIO_SECURE: "false"
      TEMPLATE_BUCKET_NAME: templates
      IMAGE_BUCKET_NAME: registrant-photos
    restart: "no"
